services:
  - type: web
    name: loanledger-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 1 --threads 4 -k gthread --timeout 120 --graceful-timeout 30 -b 0.0.0.0:$PORT app:app"
    envVars:
      - key: APP_PASSPHRASE
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_CREDS_JSON
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
