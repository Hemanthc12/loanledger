<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanLedger — EMI Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#0a0a0f; --sur:#111118; --sur2:#18181f; --sur3:#22222c;
  --bd:rgba(255,255,255,.06); --bd2:rgba(255,255,255,.12);
  --tx:#f0f0f8; --tx2:#8888a0; --tx3:#555568;
  --ac:#6c63ff; --gr:#22c55e; --rd:#ef4444; --am:#f59e0b; --cy:#06b6d4;
  font-family:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Top bar ── */
.topbar{background:var(--sur);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;align-items:center;gap:0;height:52px;flex-shrink:0}
.logo{font-size:17px;font-weight:700;margin-right:32px;letter-spacing:-.3px}
.logo span{color:var(--ac)}
.nav-tabs{display:flex;gap:2px}
.ntab{padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;border-radius:6px;color:var(--tx2);transition:all .15s;border:none;background:none}
.ntab:hover{background:var(--sur2);color:var(--tx)}
.ntab.active{background:rgba(108,99,255,.15);color:var(--ac)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--gr)}
.status-dot.err{background:var(--rd)}

/* ── Layout ── */
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:196px;min-width:196px;background:var(--sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:12px 0;overflow-y:auto}
.nav-sec{font-size:9px;color:var(--tx3);padding:10px 14px 3px;text-transform:uppercase;letter-spacing:.08em}
.sitem{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:var(--tx2);transition:all .15s;border-left:2px solid transparent;border-radius:0 6px 6px 0;margin:1px 6px 1px 0}
.sitem:hover{background:var(--sur2);color:var(--tx)}
.sitem.active{background:rgba(108,99,255,.12);color:var(--ac);border-left-color:var(--ac);font-weight:600}
.sitem-icon{width:16px;text-align:center;font-size:13px}

/* ── Main ── */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.pg-header{padding:16px 24px;background:var(--sur);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:9}
.pg-title{font-size:15px;font-weight:600}
.pg-sub{font-size:10px;color:var(--tx3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.content{padding:20px 24px}

/* ── Cards ── */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:18px}
.ctitle{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── Metrics ── */
.met{background:var(--sur2);border:1px solid var(--bd);border-radius:10px;padding:14px}
.mlabel{font-size:9px;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.mval{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace}
.msub{font-size:9px;color:var(--tx3);margin-top:3px}
.met.ac .mval{color:var(--ac)}
.met.gr .mval{color:var(--gr)}
.met.rd .mval{color:var(--rd)}
.met.am .mval{color:var(--am)}
.met.cy .mval{color:var(--cy)}

/* ── Forms ── */
.fg{margin-bottom:14px}
.flabel{font-size:11px;color:var(--tx2);margin-bottom:5px;display:block;font-weight:500}
.finput{width:100%;background:var(--sur2);border:1px solid var(--bd2);border-radius:8px;padding:9px 12px;color:var(--tx);font-size:13px;font-family:'Syne',sans-serif;outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--ac)}
.finput::placeholder{color:var(--tx3)}
select.finput option{background:var(--sur2)}

/* ── Buttons ── */
.btn{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Syne',sans-serif;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:#7c73ff}
.btn-s{background:var(--sur2);color:var(--tx);border:1px solid var(--bd2)}.btn-s:hover{background:var(--sur3)}
.btn-g{background:rgba(34,197,94,.15);color:var(--gr);border:1px solid rgba(34,197,94,.25)}.btn-g:hover{background:rgba(34,197,94,.25)}
.btn-r{background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.25)}.btn-r:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:6px 11px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-full{width:100%;justify-content:center}

/* ── Tables ── */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:8px 10px;text-align:left;color:var(--tx3);font-size:9px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);font-weight:500}
td{padding:9px 10px;border-bottom:1px solid var(--bd);color:var(--tx2);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sur2)}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase}
.bg{background:rgba(34,197,94,.15);color:var(--gr)}
.br{background:rgba(239,68,68,.15);color:var(--rd)}
.ba{background:rgba(245,158,11,.15);color:var(--am)}
.bb{background:rgba(108,99,255,.15);color:var(--ac)}
.bgr{background:var(--sur3);color:var(--tx2)}

/* ── Alert ── */
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px}
.al-s{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--gr)}
.al-e{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--rd)}
.al-i{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.2);color:var(--ac)}
.al-w{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--am)}

/* ── Misc ── */
.empty{text-align:center;padding:32px;color:var(--tx3)}
.empty-icon{font-size:28px;margin-bottom:10px}
.pb{height:5px;background:var(--sur3);border-radius:3px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ac),var(--cy))}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--bd);margin:16px 0}

@media(max-width:700px){
  .sidebar{display:none}
  .g4{grid-template-columns:1fr 1fr}
  .g3,.g2{grid-template-columns:1fr}
}
@media print{
  .topbar,.sidebar,#sync-banner,.topbar-right,#btn-pull,#btn-push,.btn{display:none!important}
  body{height:auto;overflow:visible;background:#fff;color:#000}
  .app{display:block}
  .main{overflow:visible}
  .content{padding:8px}
  .pg-header{position:static}
  .card{border:1px solid #ccc;background:#fff;break-inside:avoid}
  .mval,.mlabel,.pg-title,.ctitle{color:#000!important}
  canvas{max-width:100%}
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">Loan<span>Ledger</span></div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div class="topbar-right">
    <span id="api-status-dot" class="status-dot err" title="Checking..."></span>
    <span id="api-status-text" style="font-size:11px;color:var(--tx3)">Connecting...</span>
    <span style="width:1px;height:18px;background:var(--bd);margin:0 6px;display:inline-block"></span>
    <span id="sync-dot" class="status-dot" style="background:var(--tx3)" title="Google Sheets sync"></span>
    <span id="sync-text" style="font-size:11px;color:var(--tx3)">Sheets</span>
    <button class="btn btn-sm btn-s" id="btn-pull" onclick="syncPull()" title="Pull from Google Sheets" style="padding:4px 9px;font-size:11px">↓ Pull</button>
    <button class="btn btn-sm btn-s" id="btn-push" onclick="syncPush()" title="Push to Google Sheets" style="padding:4px 9px;font-size:11px">↑ Push</button>
  </div>
</div>
<!-- Sync banner shown while startup pull is in progress -->
<div id="sync-banner" style="display:none;background:rgba(108,99,255,.1);border-bottom:1px solid rgba(108,99,255,.2);padding:5px 24px;font-size:11px;color:var(--ac);align-items:center;gap:8px">
  <span class="spin" style="border-top-color:var(--ac)"></span>&nbsp; Loading data from Google Sheets…
</div>

<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>
  <!-- Main -->
  <div class="main">
    <div class="pg-header">
      <div class="pg-title" id="pg-title">Dashboard</div>
      <div class="pg-sub" id="pg-sub">Home Loan EMI Analytics</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
/* Mobile builds: server URL + passphrase are configured once and stored
   on-device (Capacitor's WebView has its own localStorage, separate per
   app install). Falls back to same-origin for the plain web version. */
const SETTINGS_KEY = 'loanledger_settings';
function getSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    return { serverUrl: s.serverUrl || '', passphrase: s.passphrase || '' };
  } catch { return { serverUrl: '', passphrase: '' }; }
}
function saveSettings(serverUrl, passphrase) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({ serverUrl, passphrase }));
}
function isNativeBuild() {
  // window.location.protocol is 'http(s):' on web, 'capacitor:'/'file:' inside the app
  return window.location.protocol === 'capacitor:' || window.location.protocol === 'file:';
}
let BASE = isNativeBuild() ? (getSettings().serverUrl || '').replace(/\/$/, '') : window.location.origin;

/* ═══════════════════════════ State ═══════════════════════════ */
const S = {
  page: 'dashboard',
  loans: [],
  sel: null,
  schedule: [],
  payments: [],
  summary: null,
  savings: null,
  alert: null,
};

/* ═══════════════════════════ API ══════════════════════════════ */
async function api(path, method='GET', body=null) {
  const { passphrase } = getSettings();
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (passphrase) opts.headers['X-App-Passphrase'] = passphrase;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  const json = await r.json();
  if (!json.success) {
    if (r.status === 401 && isNativeBuild()) {
      showSetupScreen('Incorrect passphrase, or it changed. Please re-enter.');
    }
    throw new Error(json.error || 'API error');
  }
  return json.data;
}

async function checkHealth() {
  try {
    await api('/api/health');
    document.getElementById('api-status-dot').classList.remove('err');
    document.getElementById('api-status-text').textContent = 'Connected';
  } catch {
    document.getElementById('api-status-text').textContent = 'Offline';
  }
}

async function loadLoans() {
  S.loans = await api('/api/loans');
}

async function loadLoanData(id) {
  if (!id) return;
  const [sch, pay, sum, sav] = await Promise.all([
    api(`/api/loans/${id}/schedule`),
    api(`/api/loans/${id}/payments`),
    api(`/api/loans/${id}/summary`),
    api(`/api/loans/${id}/part-payment-savings`).catch(() => null),
  ]);
  S.schedule = sch; S.payments = pay; S.summary = sum; S.savings = sav;
}

/* ═══════════════════════════ Nav ══════════════════════════════ */
const PAGES = {
  dashboard: ['Dashboard','Loan portfolio overview'],
  loans:     ['All Loans','Manage all loan accounts'],
  create:    ['New Loan','Create a home loan'],
  schedule:  ['EMI Schedule','Amortization table'],
  payment:   ['Add Payment','Record EMI payment'],
  partpay:   ['Part Payment','Prepay principal'],
  ratechg:   ['Rate Change','Update interest rate mid-loan'],
  calculator:['EMI Calculator','Stateless estimator'],
  foreclose: ['Foreclose Loan','Close loan early'],
  analyser:  ['Loan Analyser','What-if payoff planner'],
};

const NAV = [
  {sec:'Overview', items:[
    {p:'dashboard',icon:'◈',label:'Dashboard'},
    {p:'loans',    icon:'⊞',label:'All Loans'},
  ]},
  {sec:'Actions', items:[
    {p:'create',   icon:'＋',label:'New Loan'},
    {p:'schedule', icon:'≡',label:'EMI Schedule'},
    {p:'payment',  icon:'↑',label:'Add Payment'},
    {p:'partpay',  icon:'⇪',label:'Part Payment'},
  ]},
  {sec:'Tools', items:[
    {p:'ratechg',  icon:'%',label:'Rate Change'},
    {p:'calculator',icon:'∑',label:'EMI Calculator'},
    {p:'foreclose',icon:'✕',label:'Foreclose'},
    {p:'analyser', icon:'◎',label:'Loan Analyser'},
  ]},
];
function buildNav() {
  const sb = document.getElementById('sidebar');
  const tabs = document.getElementById('nav-tabs');
  let groups = NAV;
  if (isNativeBuild()) {
    groups = NAV.concat([{sec:'App', items:[{p:'__settings',icon:'⚙',label:'Settings'}]}]);
  }
  sb.innerHTML = groups.map(g =>
    `<div class="nav-sec">${g.sec}</div>` +
    g.items.map(it => `<div class="sitem${S.page===it.p?' active':''}" onclick="${it.p==='__settings'?'openSettingsScreen()':`nav('${it.p}')`}"><span class="sitem-icon">${it.icon}</span>${it.label}</div>`).join('')
  ).join('');
  tabs.innerHTML = ['dashboard','loans','create','schedule','payment','calculator','analyser'].map(p =>
    `<div class="ntab${S.page===p?' active':''}" onclick="nav('${p}')">${PAGES[p][0]}</div>`
  ).join('');
}

async function nav(p) {
  S.page = p;
  const [title, sub] = PAGES[p] || [p,''];
  document.getElementById('pg-title').textContent = title;
  document.getElementById('pg-sub').textContent = sub;
  buildNav();
  render();
}

/* ═══════════════════════════ Helpers ══════════════════════════ */
const fc = v => '₹' + parseFloat(v||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0});
const fn = (v,d=2) => parseFloat(v||0).toFixed(d);

function badge(s) {
  const m = {Paid:'bg',Unpaid:'bgr',Partial:'ba',Active:'bb',Closed:'br'};
  return `<span class="badge ${m[s]||'bgr'}">${s}</span>`;
}

function alertHTML() {
  if (!S.alert) return '';
  const cls = {success:'al-s',error:'al-e',info:'al-i',warning:'al-w'};
  return `<div class="alert ${cls[S.alert.type]||'al-i'}">${S.alert.msg}</div>`;
}

function showAlert(msg, type='info') {
  S.alert = {msg,type};
  render();
  setTimeout(()=>{S.alert=null;render();},5000);
}

function loanSel(blank=false) {
  return `<select class="finput" id="loan-sel" onchange="selLoan(this.value)">
    ${blank?'<option value="">— Select Loan —</option>':''}
    ${S.loans.map(l=>`<option value="${l.loan_id}" ${S.sel===l.loan_id?'selected':''}>${l.loan_id} — ${l.user_name} (${fc(l.loan_amount)})</option>`).join('')}
  </select>`;
}

async function selLoan(id) {
  S.sel = id; S.schedule=[]; S.payments=[]; S.summary=null;
  if (id) { try { await loadLoanData(id); } catch(e) { showAlert(e.message,'error'); } }
  render();
}

/* ═══════════════════════════ Pages ════════════════════════════ */

function pgDashboard() {
  const tot = S.loans.reduce((s,l)=>s+parseFloat(l.loan_amount),0);
  const act = S.loans.filter(l=>l.status==='Active').length;
  const cls = S.loans.filter(l=>l.status==='Closed').length;
  const temi = S.loans.filter(l=>l.status==='Active').reduce((s,l)=>s+parseFloat(l.emi_amount),0);
  return `${alertHTML()}
  <div class="g4" style="margin-bottom:16px">
    <div class="met ac"><div class="mlabel">Total Portfolio</div><div class="mval">${fc(tot)}</div><div class="msub">${S.loans.length} loan(s)</div></div>
    <div class="met gr"><div class="mlabel">Active</div><div class="mval">${act}</div><div class="msub">Running</div></div>
    <div class="met rd"><div class="mlabel">Closed</div><div class="mval">${cls}</div><div class="msub">Fully repaid</div></div>
    <div class="met am"><div class="mlabel">Monthly EMI Load</div><div class="mval">${fc(temi)}</div><div class="msub">Active loans</div></div>
  </div>
  <div class="g2">
    <div class="card">
      <div class="ctitle">Loan Portfolio</div>
      ${S.loans.length===0
        ? `<div class="empty"><div class="empty-icon">⊘</div><div>No loans yet. <a href="#" onclick="nav('create')" style="color:var(--ac)">Create one →</a></div></div>`
        : `<div class="twrap"><table>
            <thead><tr><th>Loan ID</th><th>Borrower</th><th>Principal</th><th>Rate</th><th>EMI</th><th>Status</th></tr></thead>
            <tbody>${S.loans.map(l=>`<tr>
              <td style="color:var(--ac);cursor:pointer" onclick="goLoan('${l.loan_id}')">${l.loan_id}</td>
              <td style="font-family:'Syne',sans-serif;color:var(--tx)">${l.user_name}</td>
              <td>${fc(l.loan_amount)}</td><td>${fn(l.interest_rate)}%</td><td>${fc(l.emi_amount)}</td>
              <td>${badge(l.status)}</td>
            </tr>`).join('')}</tbody>
          </table></div>`}
    </div>
    <div class="card">
      <div class="ctitle">Portfolio Chart</div>
      <div style="position:relative;height:200px"><canvas id="dash-chart"></canvas></div>
      <div id="dash-legend" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:10px;color:var(--tx2)"></div>
    </div>
  </div>
  <div class="card" style="margin-top:14px">
    <div class="ctitle">Quick Actions</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-p" onclick="nav('create')">＋ New Loan</button>
      <button class="btn btn-s" onclick="nav('payment')">↑ Record Payment</button>
      <button class="btn btn-s" onclick="nav('partpay')">⇪ Part Payment</button>
      <button class="btn btn-s" onclick="nav('ratechg')">% Rate Change</button>
      <button class="btn btn-s" onclick="nav('calculator')">∑ EMI Calculator</button>
    </div>
  </div>`;
}

async function goLoan(id) { S.sel=id; await loadLoanData(id); nav('schedule'); }

function pgLoans() {
  return `${alertHTML()}
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="ctitle" style="margin:0">All Loans</div>
      <button class="btn btn-p btn-sm" onclick="nav('create')">＋ New</button>
    </div>
    ${S.loans.length===0
      ? `<div class="empty"><div class="empty-icon">⊘</div><div>No loans yet</div></div>`
      : `<div class="twrap"><table>
          <thead><tr><th>Loan ID</th><th>Borrower</th><th>Amount</th><th>Rate</th><th>Months</th><th>Start</th><th>EMI</th><th>Status</th><th></th></tr></thead>
          <tbody>${S.loans.map(l=>`<tr>
            <td style="color:var(--ac)">${l.loan_id}</td>
            <td style="font-family:'Syne',sans-serif;color:var(--tx)">${l.user_name}</td>
            <td>${fc(l.loan_amount)}</td><td>${fn(l.interest_rate)}%</td>
            <td>${l.tenure_months}</td><td>${l.start_date}</td><td>${fc(l.emi_amount)}</td>
            <td>${badge(l.status)}</td>
            <td>
              <button class="btn btn-s btn-sm" onclick="goLoan('${l.loan_id}')">View</button>
              <a href="/api/loans/${l.loan_id}/report" target="_blank" class="btn btn-s btn-sm">PDF</a>
            </td>
          </tr>`).join('')}</tbody>
        </table></div>`}
  </div>`;
}

function pgCreate() {
  const today = new Date().toISOString().split('T')[0];
  return `${alertHTML()}
  <div class="g2">
    <div class="card">
      <div class="ctitle">Loan Details</div>
      <div class="fg"><label class="flabel">Borrower Name</label><input class="finput" id="c-name" placeholder="e.g. Sumanth Reddy"></div>
      <div class="fg"><label class="flabel">Loan Amount (₹)</label><input class="finput" id="c-amt" type="number" placeholder="5000000" oninput="livePreview()"></div>
      <div class="fg"><label class="flabel">Annual Interest Rate (%)</label><input class="finput" id="c-rate" type="number" step="0.01" placeholder="8.5" oninput="livePreview()"></div>
      <div class="fg"><label class="flabel">Tenure (Months)</label><input class="finput" id="c-ten" type="number" placeholder="240" oninput="livePreview()"></div>
      <div class="fg"><label class="flabel">Sanction Date (disbursement date)</label><input class="finput" id="c-sanction" type="date" value="${today}"></div>
      <div class="fg"><label class="flabel">First EMI Date</label><input class="finput" id="c-start" type="date" value="${today}"></div>
      <button class="btn btn-p btn-full" id="c-btn" onclick="doCreate()">＋ Create Loan & Generate Schedule</button>
    </div>
    <div class="card" id="c-preview">
      <div class="ctitle">Live Preview</div>

  return `${alertHTML()}

function calcLive() {
  const p=parseFloat(document.getElementById('ec-p')?.value||0);
  const r=parseFloat(document.getElementById('ec-r')?.value||0);
  const n=parseInt(document.getElementById('ec-n')?.value||0);
  const res=document.getElementById('calc-res');
  if(!res||!(p>0&&r>0&&n>0))return;
  const mr=r/12/100,emi=p*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);
  const tp=emi*n,ti=tp-p;
  res.innerHTML=`<div class="ctitle">Result</div>
    <div class="met ac" style="margin-bottom:10px"><div class="mlabel">Monthly EMI</div><div class="mval">${fc(emi)}</div></div>
    <div class="g2" style="gap:10px;margin-bottom:10px">
      <div class="met"><div class="mlabel">Total Payment</div><div class="mval" style="font-size:15px">${fc(tp)}</div></div>
      <div class="met rd"><div class="mlabel">Total Interest</div><div class="mval" style="font-size:15px">${fc(ti)}</div></div>
    </div>
    <div class="g2" style="gap:10px;margin-bottom:12px">
      <div class="met gr"><div class="mlabel">Principal</div><div class="mval" style="font-size:15px">${fc(p)}</div></div>
      <div class="met am"><div class="mlabel">Interest %</div><div class="mval" style="font-size:15px">${((ti/tp)*100).toFixed(1)}%</div></div>
    </div>
    <div style="position:relative;height:160px"><canvas id="cc"></canvas></div>
    <div style="display:flex;gap:14px;margin-top:10px;font-size:10px;color:var(--tx2)">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:#6c63ff;display:inline-block"></span>Principal ${fc(p)}</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:#ef4444;display:inline-block"></span>Interest ${fc(ti)}</span>
    </div>`;
  setTimeout(()=>{
    const cv=document.getElementById('cc');
    if(cv)new Chart(cv,{type:'doughnut',data:{labels:['Principal','Interest'],datasets:[{data:[Math.round(p),Math.round(ti)],backgroundColor:['#6c63ff','#ef4444'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
  },50);
}

const AN = { charts: {}, lumpSums: [] };

function _anKill(id) {
  if (AN.charts[id]) { try { AN.charts[id].destroy(); } catch {} delete AN.charts[id]; }
}
function _anMkChart(id, cfg) {
  _anKill(id);
  const cv = document.getElementById(id);
  if (cv && cfg) AN.charts[id] = new Chart(cv, cfg);
}
function _anFmt(d) {
  if (!d || d === '—') return '—';
  return new Date(d).toLocaleDateString('en-IN', {year:'numeric',month:'short'});
}
function _anAddM(ds, n) {
  const d = new Date(ds); d.setMonth(d.getMonth() + n);
  return d.toISOString().slice(0,10);
}
function anPrint() { window.print(); }

function anAddLump() {

  const unpaid =
    (S.schedule || [])
      .filter(r => r.status !== 'Paid');

  AN.lumpSums.push({

}

function anDelLump(idx) {
  AN.lumpSums.splice(idx, 1);
  render();
  setTimeout(anRecalc, 50);
}

function anUpdLump(idx, field, value) {
  AN.lumpSums[idx][field] =
    field === 'amount'
      ? parseFloat(value || 0)
      : value;

  anRecalc();
  console.log("Lump plans", AN.lumpSums);

/* Build scenario amortization schedule */
function _anBuildScen(P, rate, emi, extra, extraFreq, unpaid) {

  const r = rate / 12 / 100;

  let balance = P;
  let month = 0;
  let cumInt = 0;
  const rows = [];

  // Build lump sum lookup once
  const lumpMap = {};

  (AN.lumpSums || []).forEach(ls => {

    if (!ls.amount || !ls.date) return;

    const idx = unpaid.findIndex(
      x => x.due_date >= ls.date
    );

    if (idx >= 0) {
      lumpMap[idx] =
        (lumpMap[idx] || 0) + Number(ls.amount);
    }

  });

  while (balance > 1 && month < 600) {

    // Apply lump sum before interest calculation
    if (lumpMap[month]) {

      balance = Math.max(
        0,
        balance - lumpMap[month]
      );

    }

    const interest = balance * r;

    let payment = emi;

    if (
      extra > 0 &&
      extraFreq > 0 &&
      month > 0 &&
      month % extraFreq === 0
    ) {
      payment += extra;
    }

    let principal = payment - interest;

    if (principal <= 0) break;

    if (principal > balance) {
      principal = balance;
      payment = principal + interest;
    }

    balance -= principal;
    cumInt += interest;

    const date =
      month < unpaid.length
        ? unpaid[month].due_date
        : _anAddM(
            unpaid[unpaid.length - 1].due_date,
            month - unpaid.length + 1
          );

    rows.push({
      m: month,
      date,
      balance: Math.max(0, balance),
      interest,
      principal,
      emi: payment,
      cumInt,
      lumpApplied: lumpMap[month] || 0
    });

    month++;
  }

  return rows;
}

/* Simple simulate returning {months, totalInterest} */
function _anSim(P, rate, emi) {
  const r = rate / 12 / 100;
  let bal = P, m = 0, ti = 0;
  while (bal > 0.5 && m < 600) {
    const iC = bal * r; const pC = emi - iC;
    if (pC <= 0) break;
    ti += iC; bal = Math.max(0, bal - pC); m++;
  }
  return { months: m, totalInterest: ti };
}

/* Line chart common options */
function _anLineOpts() {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color:'#8888a0', font:{size:9}, boxWidth:16 } } },
    scales: {
      x: {
          grid: {
              color:'rgba(255,255,255,.04)'
          },
          ticks: {
              color:'#8888a0',
              font:{size:9},
              callback: function(value, index) {
                  return index % 6 === 0
                      ? this.getLabelForValue(value)
                      : '';
              }
          }
      },
      y: { beginAtZero: true,min: 0, grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#8888a0',font:{size:9},
           callback: v => v>=100000 ? '₹'+(v/100000).toFixed(1)+'L' : '₹'+(v/1000).toFixed(0)+'k'} }
    }
  };
}

/* ── Main recalc ── */
function anRecalc() {
  const loan   = S.loans.find(l => l.loan_id === S.sel);
  const sum    = S.summary;
  const unpaid = (S.schedule||[]).filter(r => r.status!=='Paid' && !parseInt(r.is_pre_emi||0));
  if (!loan || !sum || unpaid.length === 0) return;

  const P     = parseFloat(sum.outstanding_principal);
  const rate  = parseFloat(loan.interest_rate);
  const emi   = parseFloat(loan.emi_amount);
  const extra = parseFloat(document.getElementById('an-extra')?.value) || 0;
  const extraFreq =
    Math.max(
      1,
      parseInt(
        document.getElementById('an-extra-freq').value || 1
      )
    );
  const totalLump =
    (AN.lumpSums || [])
      .reduce((s,x)=>s + (parseFloat(x.amount)||0), 0);

  // Build original rows from S.schedule unpaid list
  let cumOrig = 0;
  const orig = unpaid.map((r, i) => ({
    m: i, date: r.due_date,
    balance:   parseFloat(r.outstanding_balance),
    interest:  parseFloat(r.interest_component),
    principal: parseFloat(r.principal_component),
    emi:       parseFloat(r.emi_amount),
    cumInt:    (cumOrig += parseFloat(r.interest_component), cumOrig),
  }));
  console.log("anRecalc CALLED");

  const hasScen = extra > 0 || totalLump  > 0;
  const scen = hasScen ? _anBuildScen(P, rate, emi, extra,extraFreq, unpaid) : [];
  console.log("extra =", extra);
  console.log("totalLump =", totalLump);
  console.log("lumpSums =", AN.lumpSums);   
  console.log("hasScen =", hasScen);
  console.log("scen rows =", scen.length);

  const origTotalInt = orig.length > 0 ? orig[orig.length-1].cumInt : 0;
  const scenTotalInt = scen.length > 0 ? scen[scen.length-1].cumInt : origTotalInt;
  const monthsSaved  = orig.length - scen.length;
  const intSaved     = origTotalInt - scenTotalInt;
  const origPayoff   = orig.length > 0 ? orig[orig.length-1].date : '—';
  const scenPayoff   = scen.length > 0 ? scen[scen.length-1].date : origPayoff;
  const pct          = origTotalInt > 0 ? Math.round(intSaved / origTotalInt * 100) : 0;

  // Update summary cards
  const set = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  set('an-ms',  hasScen ? (monthsSaved > 0 ? monthsSaved : '0') : '—');
  set('an-ms2', hasScen && monthsSaved > 0 ? `${orig.length} → ${scen.length} months` : '');
  set('an-is',  hasScen ? fc(Math.max(0, intSaved)) : '—');
  set('an-is2', hasScen && pct > 0 ? `${pct}% less interest` : '');
  set('an-pd',  _anFmt(hasScen ? scenPayoff : origPayoff));
  set('an-pd2', hasScen && monthsSaved > 0 ? `was ${_anFmt(origPayoff)}` : '');
  set('an-tc',  hasScen ? fc(P + scenTotalInt) : fc(P + origTotalInt));
  set('an-tc2', hasScen ? `was ${fc(P + origTotalInt)}` : 'principal + interest');

  // Target payoff input
  const tgt = parseInt(document.getElementById('an-target')?.value) || 0;
  const tgtEl = document.getElementById('an-tgt-out');
  if (tgtEl) {
    if (tgt > 0 && tgt < orig.length) {
      const r2 = rate / 12 / 100;
      const reqEmi = r2 === 0 ? P/tgt : P*r2*Math.pow(1+r2,tgt)/(Math.pow(1+r2,tgt)-1);
      const xtra = Math.max(0, reqEmi - emi);
      tgtEl.innerHTML = `<span style="color:var(--gr)">Need extra <strong>${fc(xtra)}/month</strong> → new EMI ${fc(reqEmi)}, saves ${fc(_anSim(P,rate,reqEmi).totalInterest < origTotalInt ? origTotalInt-_anSim(P,rate,reqEmi).totalInterest : 0)} interest</span>`;
    } else if (tgt >= orig.length && tgt > 0) {
      tgtEl.innerHTML = `<span style="color:var(--am)">Target must be < current ${orig.length} months</span>`;
    } else { tgtEl.textContent = ''; }
  }
  const lump =
    (AN.lumpSums || []).reduce(
      (s, x) => s + (parseFloat(x.amount) || 0),
      0
    );

  let lumpIdx = -1;

  if (AN.lumpSums && AN.lumpSums.length > 0) {
    const firstLump = AN.lumpSums.find(
      x => x.amount > 0 && x.date
    );

    if (firstLump) {
      lumpIdx = unpaid.findIndex(
        r => r.due_date >= firstLump.date
      );
    }
  }

  console.log("orig rows =", orig.length);
  console.log("scen rows =", scen.length);
  console.log("table element =", document.getElementById("an-tbl"));
  // Draw charts
  _anDrawBal(orig, scen, hasScen);
  _anDrawInt(orig, scen, hasScen);
  _anDrawSavings(orig, scen, hasScen);
  _anDrawSens(P, rate, emi, extra,lump, unpaid);
  _anDrawTable(orig, scen, hasScen,lumpIdx,lump);
}

function _anDrawBal(orig, scen, hasScen) {

  const labels = orig.map(r => r.date.slice(0,7));

  const datasets = [
    {
      label:'Original',
      data: orig.map(r => r.balance),
      borderColor:'#ef4444',
      backgroundColor:'rgba(239,68,68,.08)',
      borderWidth:2,
      pointRadius:0,
      fill:true,
      tension:.3
    }
  ];

  if (hasScen && scen.length > 0) {

    const scenData = labels.map((_, i) =>
      i < scen.length ? scen[i].balance : 0
    );

    datasets.push({
      label:'Scenario',
      data: scenData,
      borderColor:'#22c55e',
      backgroundColor:'rgba(34,197,94,.08)',
      borderWidth:3,
      pointRadius:0,
      fill:false,
      tension:.3
    });

    (AN.lumpSums || []).forEach(ls => {

      if (!ls.amount || !ls.date) return;

      const idx = labels.findIndex(
        d => d >= ls.date.slice(0,7)
      );

      if (idx >= 0) {

        datasets.push({
          label: `₹${Math.round(ls.amount).toLocaleString()}`,
          data: labels.map((_, i) =>
            i === idx ? scenData[i] : null
          ),
          pointRadius: 7,
          pointHoverRadius: 9,
          pointBackgroundColor: '#6c63ff',
          pointBorderColor: '#ffffff',
          pointBorderWidth: 2,
          showLine: false
        });

      }

    });
  }

  _anMkChart(
    'an-c-bal',
    {
      type:'line',
      data:{labels,datasets},
      options:_anLineOpts()
    }
  );
}

function _anDrawInt(orig, scen, hasScen) {
  //const show = orig.slice(0, 60);
  const show = orig;
  const labels = show.map(r => r.date.slice(0,7));
  const ds = [{
    label:'Original Interest', data: show.map(r => r.cumInt),
    borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,.08)',
    borderWidth:2, pointRadius:0, fill:true, tension:.3,
  }];
  if (hasScen && scen.length > 0) {
    //const scenShow = scen.slice(0, 60);
    const scenShow = scen;
    const padded = show.map((_,i) => i < scenShow.length ? scenShow[i].cumInt : scenShow[scenShow.length-1].cumInt);
    ds.push({
      label:'Scenario Interest', data: padded,
      borderColor:'#06b6d4', backgroundColor:'rgba(6,182,212,.08)',
      borderWidth:2, pointRadius:0, fill:true, tension:.3, borderDash:[6,3],
    });
  }
  _anMkChart('an-c-int', { type:'line', data:{labels, datasets:ds}, options:_anLineOpts() });
}

function _anDrawSens(P, rate, emi, extra, lump, unpaid) {
    if (!Array.isArray(unpaid)) {
      console.error("unpaid is invalid", unpaid);
      return;
    }
  const noteEl = document.getElementById('an-sens-note');
  if (lump <= 0 || lump >= P) {
    if (noteEl) noteEl.textContent = 'Enter a lump sum amount above to see how payment timing affects months saved';
    _anMkChart('an-c-sens', null);
    return;
  }
  const r = rate / 12 / 100;
  const origMonths = _anSim(P, rate, emi + extra).months;
  const maxShow = Math.min(unpaid.length, 60);
  const labels = [], data = [], colors = [];

  for (let i = 0; i < maxShow; i++) {
    // Balance at start of month i (before paying EMI i)
    const balAtI = i === 0 ? P : parseFloat(unpaid[i-1].outstanding_balance);
    const newBal = Math.max(0, balAtI - lump);
    const remMonths = newBal <= 0.5 ? 0 : _anSim(newBal, rate, emi + extra).months;
    const totalMonths = i + remMonths;
    const saved = Math.max(0, origMonths - totalMonths);
    labels.push(unpaid[i].due_date.slice(0,7));
    data.push(saved);
  }
  const maxSaved = Math.max(...data);
  const bestIdx  = data.indexOf(maxSaved);
  data.forEach((v, i) => colors.push(i === bestIdx ? '#22c55e' : 'rgba(108,99,255,.65)'));

  if (noteEl) noteEl.textContent = maxSaved > 0
    ? `Best timing: pay in ${labels[bestIdx]} → saves ${maxSaved} month${maxSaved>1?'s':''} | Earlier generally saves more interest`
    : 'Lump sum too small to shorten tenure at this EMI level';

  _anMkChart('an-c-sens', {
    type:'bar',
    data: { labels, datasets:[{ label:'Months Saved', data, backgroundColor:colors, borderRadius:3, borderWidth:0 }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888a0',font:{size:8},maxTicksLimit:12}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888a0',font:{size:9}},
           title:{display:true,text:'Months Saved',color:'#8888a0',font:{size:9}}}
      }
    }
  });
}

function _anDrawSavings(orig, scen, hasScen) {
  const el = document.getElementById('an-c-savings');
  if (!el) return;
  if (!hasScen || scen.length === 0) {
    _anMkChart('an-c-savings', null);
    return;
  }
  const maxShow = Math.min(orig.length, 60);
  const labels = [], data = [];
  for (let i = 0; i < maxShow; i++) {
    const s = scen[i];
    const saved = s ? Math.max(0, orig[i].interest - s.interest) : orig[i].interest;
    labels.push(orig[i].date.slice(0,7));
    data.push(Math.round(saved));
  }
  _anMkChart('an-c-savings', {
    type:'bar',
    data: { labels, datasets:[{ label:'Interest Saved', data, backgroundColor:'rgba(34,197,94,.7)', borderRadius:3, borderWidth:0 }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888a0',font:{size:8},maxTicksLimit:12}},
        y:{beginAtZero:true,grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888a0',font:{size:9},
           callback: v => v>=100000 ? '₹'+(v/100000).toFixed(1)+'L' : '₹'+(v/1000).toFixed(0)+'k'}}
      }
    }
  });
}

function _anDrawTable(orig, scen, hasScen, lumpIdx, lump) {
  const el = document.getElementById('an-tbl');
  const noteEl = document.getElementById('an-tbl-note');
  if (!el) return;
  const rows = orig.slice(0, 200);
  const scenLen = scen.length;
  if (noteEl) noteEl.textContent = hasScen && scen.length < orig.length
    ? `Scenario ends ${orig.length - scen.length} months earlier`  : '';
  el.innerHTML = `<table>
    <thead><tr>
      <th>#</th><th>Due Date</th>
      <th>Orig Balance</th><th>Orig Interest</th><th>Orig EMI</th>
      ${hasScen?`<th>Scen Balance</th><th>Scen Interest</th><th>Int Saved</th>`:''}
    </tr></thead>
    <tbody>${rows.map((r,i) => {
      const s = scen[i];
      const isLump = hasScen && lump > 0 && i === lumpIdx;
      const closed = hasScen && !s;
      return `<tr style="${isLump?'background:rgba(108,99,255,.1);':''}${closed?'color:var(--tx3);':''}">
        <td>${i+1}${isLump?' <span style="color:var(--ac);font-size:9px">⬟LUMP</span>':''}</td>
        <td>${r.date}</td>
        <td style="color:var(--rd)">${fc(r.balance)}</td>
        <td style="color:var(--am)">${fc(r.interest)}</td>
        <td>${fc(r.emi)}</td>
        ${hasScen?`
          <td style="color:${s?'var(--gr)':'var(--tx3)'}">${s?fc(s.balance):'—'}</td>
          <td style="color:${s?'var(--cy)':'var(--tx3)'}">${s?fc(s.interest):'—'}</td>
          <td style="color:${s&&r.interest>s.interest?'var(--gr)':'var(--tx3);opacity:.4'};font-weight:600">
            ${s&&r.interest>s.interest?fc(r.interest-s.interest):'—'}</td>
        `:''}</tr>`;
    }).join('')}</tbody>
  </table>`;
}

/* ═══════════════════════════ Render ═══════════════════════════ */
function render() {
  const pages = {dashboard:pgDashboard,loans:pgLoans,create:pgCreate,schedule:pgSchedule,payment:pgPayment,partpay:pgPartpay,ratechg:pgRatechg,calculator:pgCalc,foreclose:pgForeclose,analyser:pgAnalyser};
  document.getElementById('content').innerHTML = (pages[S.page]||pgDashboard)();
  if (S.page==='dashboard') setTimeout(drawDashChart,60);
  if (S.page==='calculator') setTimeout(calcLive,60);
  if (S.page==='analyser')   setTimeout(anRecalc,60);
}

function drawDashChart() {
  const cv=document.getElementById('dash-chart');
  if(!cv||S.loans.length===0)return;
  const cols=['#6c63ff','#22c55e','#f59e0b','#ef4444','#06b6d4','#8b5cf6'];
  new Chart(cv,{
    type:'bar',
    data:{
      labels:S.loans.map(l=>l.user_name.split(' ')[0]),
      datasets:[{data:S.loans.map(l=>parseFloat(l.loan_amount)),backgroundColor:S.loans.map((_,i)=>cols[i%cols.length]+'bb'),borderRadius:6,borderWidth:0}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888a0',font:{size:10}}},
      y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888a0',font:{size:10},callback:v=>'₹'+(v/100000).toFixed(0)+'L'}}
    }}
  });
  const leg=document.getElementById('dash-legend');
  if(leg)leg.innerHTML=S.loans.map((l,i)=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:${cols[i%cols.length]};display:inline-block"></span>${l.user_name.split(' ')[0]}</span>`).join('');
}

/* ═══════════════════════════ Google Sheets Sync ══════════════ */
function _timeAgo(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 5)    return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}

async function checkSyncStatus() {
  try {
    const st = await api('/api/sync/status');
    const dot = document.getElementById('sync-dot');
    const txt = document.getElementById('sync-text');
    const ban = document.getElementById('sync-banner');

    if (!st.enabled) {
      dot.style.background = 'var(--tx3)';
      txt.textContent = 'Sheets: off';
      ban.style.display = 'none';
      return;
    }
    if (st.pulling) {
      dot.style.background = 'var(--am)';
      txt.textContent = 'Syncing…';
      ban.style.display = 'flex';
      setTimeout(checkSyncStatus, 2000);
      return;
    }
    ban.style.display = 'none';
    if (st.pull_error || st.push_error) {
      dot.style.background = 'var(--rd)';
      txt.textContent = 'Sheets: error';
      txt.title = st.pull_error || st.push_error;
    } else {
      dot.style.background = 'var(--gr)';
      const ts = st.last_push || st.last_pull;
      txt.textContent = ts ? 'Synced ' + _timeAgo(ts) : 'Sheets: ready';
    }
  } catch { /* ignore — server may be starting up */ }
}

async function syncPull() {
  const btn = document.getElementById('btn-pull');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  try {
    const res = await api('/api/sync/pull', 'POST');
    await loadLoans();
    render();
    showAlert(res.message, 'success');
  } catch(e) {
    showAlert('Pull failed: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '↓ Pull';
  checkSyncStatus();
}

async function syncPush() {
  const btn = document.getElementById('btn-push');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  try {
    const res = await api('/api/sync/push', 'POST');
    showAlert(res.message, 'success');
  } catch(e) {
    showAlert('Push failed: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '↑ Push';
  checkSyncStatus();
}

/* ═══════════════════════════ Init ═════════════════════════════ */
async function startApp() {
  buildNav();render();
  await checkHealth();
  checkSyncStatus();
  try { await loadLoans(); } catch(e) { showAlert('Could not load loans: '+e.message,'error'); }
  render();
  // Re-check sync status after a short delay (startup pull may still be running)
  setTimeout(async () => {
    await checkSyncStatus();
    try { await loadLoans(); render(); } catch {}
  }, 4000);
}

(function init() {
  if (isNativeBuild()) {
    const { serverUrl } = getSettings();
    if (!serverUrl) { showSetupScreen(); return; }
    BASE = serverUrl;
  }
  startApp();
})();
function showSetupScreen(message) {
  const { serverUrl, passphrase } = getSettings();
  const el = document.createElement('div');
  el.id = 'setup-overlay';
  el.style.cssText = 'position:fixed;inset:0;background:#0a0a0f;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
  el.innerHTML = `
    <div style="max-width:380px;width:100%;background:#111118;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:28px;">
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#f0f0f8;margin-bottom:6px;">LoanLedger Setup</div>
      <div style="font-size:13px;color:#8888a0;margin-bottom:20px;">Enter your family server address and shared passphrase. You only need to do this once per device.</div>
      ${message ? `<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;font-size:12.5px;padding:8px 10px;border-radius:8px;margin-bottom:14px;">${message}</div>` : ''}
      <label style="font-size:12px;color:#8888a0;display:block;margin-bottom:5px;">Server URL</label>
      <input id="setup-url" type="text" placeholder="https://your-app.onrender.com" value="${serverUrl || ''}"
        style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:#18181f;color:#f0f0f8;font-size:13px;margin-bottom:14px;">
      <label style="font-size:12px;color:#8888a0;display:block;margin-bottom:5px;">Family Passphrase</label>
      <input id="setup-pass" type="password" placeholder="Shared passphrase" value="${passphrase || ''}"
        style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:#18181f;color:#f0f0f8;font-size:13px;margin-bottom:18px;">
      <button id="setup-save" style="width:100%;padding:11px;border-radius:8px;border:none;background:#6c63ff;color:white;font-size:14px;font-weight:600;cursor:pointer;">Connect</button>
      <div id="setup-status" style="font-size:12px;color:#8888a0;margin-top:10px;text-align:center;min-height:16px;"></div>
    </div>`;
  document.body.appendChild(el);

  document.getElementById('setup-save').onclick = async () => {
    const url = document.getElementById('setup-url').value.trim().replace(/\/$/, '');
    const pass = document.getElementById('setup-pass').value;
    const statusEl = document.getElementById('setup-status');
    if (!url) { statusEl.textContent = 'Server URL is required.'; return; }
    statusEl.textContent = 'Connecting…';
    saveSettings(url, pass);
    BASE = url;
    try {
      const r = await fetch(url + '/api/auth/check', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ passphrase: pass }),
      });
      const json = await r.json();
      if (!json.success) { statusEl.textContent = json.error || 'Could not connect.'; return; }
      el.remove();
      startApp();
    } catch (e) {
      statusEl.textContent = 'Could not reach server. Check the URL and your connection.';
    }
  };
}

function openSettingsScreen() { showSetupScreen(); }
